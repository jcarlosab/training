<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #252525;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.2);
            --danger: #ff4444;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .btn-add {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--accent-dim);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }

        .kpi-value.time {
            font-size: 28px;
        }

        .section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .weekly-goal {
            margin-bottom: 20px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .goal-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .goal-text strong {
            color: var(--text-primary);
        }

        .progress-bar {
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00cc66);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            min-width: 60px;
        }

        .progress-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--bg-primary);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: grid;
            grid-template-columns: 100px 1fr 80px 80px;
            gap: 15px;
            align-items: center;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .activity-item:hover {
            background: var(--bg-primary);
            transform: translateX(5px);
        }

        .activity-date {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .activity-distance {
            font-weight: 600;
            color: var(--accent);
        }

        .activity-time, .activity-pace {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        .modal h2 {
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px var(--accent-dim);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .section {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .activity-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Run<span>Tracker</span></h1>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="#">Activities</a>
                <a href="#">Analytics</a>
                <a href="#">Settings</a>
            </nav>
            <button class="btn-add" onclick="openModal()">+ Nueva Carrera</button>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Distancia Total</div>
                <div class="kpi-value" id="total-distance">0.0 km</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Tiempo Total</div>
                <div class="kpi-value time" id="total-time">00:00:00</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Ritmo Promedio</div>
                <div class="kpi-value" id="avg-pace">--:-- min/km</div>
            </div>
        </div>

        <div class="section">
            <div class="card">
                <h2>Objetivo Semanal</h2>
                <div class="weekly-goal">
                    <div class="goal-header">
                        <span class="goal-text">Progreso semanal</span>
                        <span class="goal-text" id="goal-text">0 / 50 km</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%">
                            <span class="progress-text" id="progress-text">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Últimas Carreras</h2>
                <div class="activity-list" id="activity-list">
                    <div class="empty-state">No hay carreras registradas</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Añadir Nueva Carrera</h2>
            <form id="run-form">
                <div class="form-group">
                    <label for="distance">Distancia (km)</label>
                    <input type="number" id="distance" step="0.01" min="0" required placeholder="ej: 5.5">
                </div>
                <div class="form-group">
                    <label for="time">Tiempo (minutos)</label>
                    <input type="number" id="time" min="1" required placeholder="ej: 30">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data storage
        let runs = JSON.parse(localStorage.getItem('runs')) || [];
        const weeklyGoal = 50;

        // DOM Elements
        const totalDistanceEl = document.getElementById('total-distance');
        const totalTimeEl = document.getElementById('total-time');
        const avgPaceEl = document.getElementById('avg-pace');
        const progressFillEl = document.getElementById('progress-fill');
        const progressTextEl = document.getElementById('progress-text');
        const goalTextEl = document.getElementById('goal-text');
        const activityListEl = document.getElementById('activity-list');
        const modalEl = document.getElementById('modal');
        const formEl = document.getElementById('run-form');

        // Format time as HH:MM:SS
        function formatTime(minutes) {
            const h = Math.floor(minutes / 60);
            const m = Math.floor(minutes % 60);
            const s = Math.floor((minutes * 60) % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Format pace as MM:SS
        function formatPace(minPerKm) {
            const m = Math.floor(minPerKm);
            const s = Math.floor((minPerKm % 1) * 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            return date.toLocaleDateString('es-ES', options);
        }

        // Calculate KPIs
        function updateKPIs() {
            const totalDistance = runs.reduce((sum, run) => sum + run.distance, 0);
            const totalMinutes = runs.reduce((sum, run) => sum + run.time, 0);
            
            // Update total distance
            totalDistanceEl.textContent = `${totalDistance.toFixed(1)} km`;
            
            // Update total time
            totalTimeEl.textContent = formatTime(totalMinutes);
            
            // Update average pace
            if (totalDistance > 0) {
                const avgPace = totalMinutes / totalDistance;
                avgPaceEl.textContent = `${formatPace(avgPace)} min/km`;
            } else {
                avgPaceEl.textContent = '--:-- min/km';
            }
        }

        // Update weekly progress
        function updateWeeklyProgress() {
            const thisWeekRuns = runs.filter(run => {
                const runDate = new Date(run.date);
                const now = new Date();
                const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                return runDate >= weekAgo;
            });
            
            const weeklyDistance = thisWeekRuns.reduce((sum, run) => sum + run.distance, 0);
            const percentage = Math.min((weeklyDistance / weeklyGoal) * 100, 100);
            
            progressFillEl.style.width = `${percentage}%`;
            progressTextEl.textContent = `${Math.round(percentage)}%`;
            goalTextEl.textContent = `${weeklyDistance.toFixed(1)} / ${weeklyGoal} km`;
        }

        // Update activity list
        function updateActivityList() {
            if (runs.length === 0) {
                activityListEl.innerHTML = '<div class="empty-state">No hay carreras registradas</div>';
                return;
            }
            
            const recentRuns = [...runs].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            
            activityListEl.innerHTML = recentRuns.map(run => {
                const pace = run.time / run.distance;
                return `
                    <div class="activity-item">
                        <span class="activity-date">${formatDate(run.date)}</span>
                        <span class="activity-distance">${run.distance} km</span>
                        <span class="activity-time">${formatTime(run.time)}</span>
                        <span class="activity-pace">${formatPace(pace)}/km</span>
                    </div>
                `;
            }).join('');
        }

        // Save to localStorage
        function saveRuns() {
            localStorage.setItem('runs', JSON.stringify(runs));
        }

        // Update all
        function updateAll() {
            updateKPIs();
            updateWeeklyProgress();
            updateActivityList();
        }

        // Modal functions
        function openModal() {
            modalEl.classList.add('active');
            document.getElementById('distance').focus();
        }

        function closeModal() {
            modalEl.classList.remove('active');
            formEl.reset();
        }

        // Form submit
        formEl.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const distance = parseFloat(document.getElementById('distance').value);
            const time = parseFloat(document.getElementById('time').value);
            
            const newRun = {
                date: new Date().toISOString(),
                distance: distance,
                time: time
            };
            
            runs.unshift(newRun);
            saveRuns();
            updateAll();
            closeModal();
        });

        // Close modal on overlay click
        modalEl.addEventListener('click', function(e) {
            if (e.target === modalEl) {
                closeModal();
            }
        });

        // Initialize
        updateAll();
    </script>
</body>
</html>
